<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Teacher Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1a1d27;
            padding: 20px 30px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 22px;
            color: #63b3ed;
        }

        .header p {
            font-size: 13px;
            color: #718096;
        }

        .upload-section {
            background: #1a1d27;
            padding: 15px 30px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .upload-btn {
            background: #2b6cb0;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .upload-btn:hover { background: #3182ce; }

        #upload-status {
            font-size: 13px;
            color: #68d391;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .user-message {
            background: #2b6cb0;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #1a1d27;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2d3748;
        }

        .sources {
            margin-top: 8px;
            font-size: 12px;
            color: #a0aec0;
            border-top: 1px solid #2d3748;
            padding-top: 8px;
        }

        .sources span {
            color: #63b3ed;
        }

        .thinking {
            background: #1a1d27;
            align-self: flex-start;
            border: 1px solid #2d3748;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            color: #a0aec0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-section {
            background: #1a1d27;
            padding: 20px 30px;
            border-top: 1px solid #2d3748;
            display: flex;
            gap: 10px;
        }

        #question-input {
            flex: 1;
            background: #0f1117;
            border: 1px solid #2d3748;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        #question-input:focus {
            border-color: #63b3ed;
        }

        #question-input::placeholder {
            color: #4a5568;
        }

        .send-btn {
            background: #2b6cb0;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .send-btn:hover { background: #3182ce; }

        .welcome-msg {
            text-align: center;
            color: #4a5568;
            margin: auto;
            font-size: 15px;
        }

        .welcome-msg h2 {
            color: #63b3ed;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🎓 STEM Teacher Assistant</h1>
        <p>Powered by RAG + Mistral — answers only from your uploaded documents</p>
    </div>
</div>

<div class="upload-section">
    <input type="file" id="pdf-input" accept=".pdf" style="display:none">
    <button class="upload-btn" onclick="document.getElementById('pdf-input').click()">
        📄 Upload STEM Document
    </button>
    <span id="upload-status">No document uploaded yet</span>
</div>

<div class="chat-container" id="chat-container">
    <div class="welcome-msg">
        <h2>Welcome to STEM Teacher Assistant</h2>
        <p>Upload a STEM curriculum PDF above, then ask teaching questions below.</p>
    </div>
</div>

<div class="input-section">
    <input 
        type="text" 
        id="question-input" 
        placeholder="Ask a teaching question... e.g. How do I explain Newton's laws to students?"
        onkeypress="if(event.key==='Enter') sendQuestion()"
    >
    <button class="send-btn" onclick="sendQuestion()">Send →</button>
</div>

<script>
    // Upload PDF
    document.getElementById('pdf-input').addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;

        const status = document.getElementById('upload-status');
        status.style.color = '#a0aec0';
        status.textContent = `Uploading and indexing ${file.name}...`;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.error) {
                status.style.color = '#fc8181';
                status.textContent = data.error;
            } else {
                status.style.color = '#68d391';
                status.textContent = `${data.message} — ${data.chunks} chunks indexed`;
                
                // Clear welcome message
                document.getElementById('chat-container').innerHTML = '';
            }
        } catch (err) {
            status.style.color = '#fc8181';
            status.textContent = 'Upload failed. Make sure Flask server is running.';
        }
    });

    // Send question
    async function sendQuestion() {
        const input = document.getElementById('question-input');
        const question = input.value.trim();
        if (!question) return;

        const container = document.getElementById('chat-container');

        // Add user message
        container.innerHTML += `
            <div class="message user-message">${question}</div>
        `;
        input.value = '';

        // Add thinking indicator
        const thinkingId = 'thinking-' + Date.now();
        container.innerHTML += `
            <div class="thinking" id="${thinkingId}">⏳ Mistral is thinking...</div>
        `;
        container.scrollTop = container.scrollHeight;

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await response.json();

            // Remove thinking
            document.getElementById(thinkingId).remove();

            // Add bot message
            const sourcesHtml = data.sources && data.sources.length > 0
                ? `<div class="sources"><span>📚 Sources:</span> ${data.sources.join(', ')}</div>`
                : '';

            container.innerHTML += `
                <div class="message bot-message">
                    ${data.answer}
                    ${sourcesHtml}
                </div>
            `;
        } catch (err) {
            document.getElementById(thinkingId).remove();
            container.innerHTML += `
                <div class="message bot-message" style="color:#fc8181">
                    Error connecting to server. Make sure Flask is running.
                </div>
            `;
        }

        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
